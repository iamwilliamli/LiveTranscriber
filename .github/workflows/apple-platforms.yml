name: Apple Platforms

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apple-platforms-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.name }}
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: domain
            name: Shared domain tests
          - lane: ios
            name: iOS 26 compatibility build
          - lane: macos
            name: macOS app tests

    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Report toolchain
        run: xcodebuild -version

      - name: Test shared packages
        if: matrix.lane == 'domain'
        run: >-
          xcrun swift test
          --package-path Packages/TranscriberDomain
          --scratch-path "$HOME/Library/Developer/Xcode/DerivedData/TranscriberDomain-CI"

      - name: Test speech runtime compatibility
        if: matrix.lane == 'domain'
        run: >-
          xcrun swift test
          --package-path Packages/Qwen3Speech
          --scratch-path "$HOME/Library/Developer/Xcode/DerivedData/Qwen3Speech-CI"

      - name: Build iOS app
        if: matrix.lane == 'ios'
        run: >-
          xcodebuild
          -workspace LiveTranscriber.xcworkspace
          -scheme LiveTranscriber
          -destination 'generic/platform=iOS Simulator'
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO
          -quiet
          build

      - name: Verify vendored iOS symbols
        if: matrix.lane == 'ios'
        shell: bash
        run: |
          set -euo pipefail
          for name in whisper llama; do
            slice="Vendor/${name}.xcframework/ios-arm64"
            binary="${slice}/${name}.framework/${name}"
            dsym="${slice}/dSYMs/${name}.dSYM"
            binary_uuid="$(xcrun dwarfdump --uuid "${binary}" | awk '{ print $2, $3 }')"
            dsym_uuid="$(xcrun dwarfdump --uuid "${dsym}" | awk '{ print $2, $3 }')"
            test "$(lipo -archs "${binary}")" = "arm64"
            test "${binary_uuid}" = "${dsym_uuid}"
          done

      - name: Verify vendored macOS symbols
        if: matrix.lane == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          for name in whisper llama; do
            slice="Vendor/${name}.xcframework/macos-arm64"
            binary="${slice}/${name}.framework/Versions/A/${name}"
            dsym="${slice}/dSYMs/${name}.dSYM"
            binary_uuid="$(xcrun dwarfdump --uuid "${binary}" | awk '{ print $2, $3 }')"
            dsym_uuid="$(xcrun dwarfdump --uuid "${dsym}" | awk '{ print $2, $3 }')"
            test "$(lipo -archs "${binary}")" = "arm64"
            test "${binary_uuid}" = "${dsym_uuid}"
          done

      - name: Test macOS app
        if: matrix.lane == 'macos'
        run: >-
          xcodebuild
          -workspace LiveTranscriber.xcworkspace
          -scheme LiveTranscriberMac
          -destination 'platform=macOS,arch=arm64'
          -skipPackagePluginValidation
          CODE_SIGNING_ALLOWED=NO
          -quiet
          test
